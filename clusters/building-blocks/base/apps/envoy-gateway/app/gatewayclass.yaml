---
# GatewayClass tells Envoy Gateway to manage Gateways using this class.
# All HTTPRoute/TLSRoute resources reference this class via parentRef.
apiVersion: gateway.networking.k8s.io/v1
kind: GatewayClass
metadata:
  name: envoy-gateway
spec:
  controllerName: gateway.envoyproxy.io/gatewayclass-controller
