---
# yaml-language-server: $schema=https://json.schemastore.org/helmfile

helmDefaults:
  cleanupOnFail: true
  wait: true
  waitForJobs: true
  timeout: 300

repositories:
  - name: cilium
    url: https://helm.cilium.io

releases:
  - name: cilium
    namespace: kube-system
    chart: cilium/cilium
    version: 1.19.4
    values:
      - ./templates/cilium.yaml.gotmpl
    hooks:
      - # Wait for Cilium CRDs before continuing
        command: bash
        args:
          - -c
          - |
            until kubectl get crd ciliumloadbalancerippools.cilium.io \
              ciliumbgpadvertisements.cilium.io &>/dev/null; do
              echo "Waiting for Cilium CRDs..."; sleep 5
            done
        events: [postsync]
        showlogs: true
